version: "3.9"

services:
  db:
    image: postgres:16
    container_name: time-capsule-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: timecapsule
    ports:
      - "5433:5432"

  backend:
    build: ./backend
    container_name: time-capsule-backend
    env_file:
      - ./backend/.env
    depends_on:
      - db
    ports:
      - "8000:8000"
    # volumes:   # <--- NÃO USE VOLUME AQUI!

  frontend:
    build: ./frontend
    container_name: time-capsule-frontend
    depends_on:
      - backend
    ports:
      - "8501:8501"